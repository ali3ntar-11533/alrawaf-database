kind = "web"
previewPath = "/"
title = "قاعدة بيانات الموردين والمقاولين - الرواف"
version = "1.0.0"
id = "artifacts/rawaf-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20498

[services.development]
run = "pnpm --filter @workspace/rawaf-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rawaf-dashboard", "run", "build" ]
publicDir = "artifacts/rawaf-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20498"
BASE_PATH = "/"
